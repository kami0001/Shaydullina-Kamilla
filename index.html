<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Шайдуллина</title>
  </head>
  <body>
<!-- шфпка -->
    <header class="header">
      <div class="header-container">
        <a href="#" class="xbox-logo">
          <img src="./img/logo.png" alt="" />
        </a>
        <nav class="nav-links">
          <a href="#" class="nav-link">Games ▾</a>
          <a href="#" class="nav-link">Consoles ▾</a>
          <a href="#" class="nav-link">Community</a>
        </nav>
        <div class="header-right">
          <div class="search-box">
            <input type="text" placeholder="Search" />
          </div>
          <img src="./img/user.png" alt="" />
          <a href="#" class="my-xbox">My XBOX</a>
          <img src="./img/down-arrow.png" alt="" />
        </div>
      </div>
    </header>
<!-- hero -->
    <section class="hero-banner">
      <img src="./img/Group.png" alt="Call of Duty WWII" class="hero-image" />
      <div class="hero-overlay">
        <div class="hero-content">
          <h1 class="hero-title">Call of Duty: WWII</h1>
          <p class="hero-release">Released on: 23/11/2017</p>
          <div class="hero-buttons">
            <a href="#" class="btn btn-green">Order Now</a>
            <a href="#" class="btn btn-green-outline">More Games</a>
          </div>
        </div>
      </div>
    </section>


  </body>
</html>
